name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build and run self-tests
        shell: powershell
        run: .\build.ps1 -SkipDesktopCopy

      - name: Run GUI smoke test
        shell: powershell
        run: |
          $exe = Get-ChildItem -LiteralPath .\build -Filter '*.exe' |
            Where-Object { $_.Name -ne 'SelfTests.exe' } |
            Select-Object -First 1
          if (-not $exe) { throw 'Application executable was not produced.' }
          $process = Start-Process -FilePath $exe.FullName -ArgumentList '--smoke-test' -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Smoke test failed: $($process.ExitCode)" }

      - name: Upload application
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: M3U8-Windows-GUI
          path: build/M3U8视频下载器.exe
          if-no-files-found: error

      - name: Package release files
        shell: powershell
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
            '1.2.2-ci'
          }
          .\package.ps1 -Version $version -SkipBuild

      - name: Upload release package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: M3U8-Windows-Release
          path: dist/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download release package artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: M3U8-Windows-Release
          path: dist

      - name: Create GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem -LiteralPath .\dist -File | ForEach-Object { $_.FullName }
          gh release create $env:GITHUB_REF_NAME $assets `
            --repo $env:GITHUB_REPOSITORY `
            --title "M3U8 Video Downloader $env:GITHUB_REF_NAME" `
            --generate-notes
